<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滚动截图</title>
  <style>
    body {
      width: 200px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    #captureBtn {
      background-color: #4CAF50;
      color: white;
    }
    #captureBtn:hover {
      background-color: #45a049;
    }
    #stopBtn {
      background-color: #f44336;
      color: white;
    }
    #stopBtn:hover {
      background-color: #da190b;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>滚动截图</h3>
    <button id="captureBtn">开始截图</button>
    <button id="stopBtn" disabled>结束截图</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
